# Demo Config - For pipeline testing with synthetic data
# Uses same model architecture as semantickitti.yaml but with corrected local paths
format_version: 4

###################
## Model options
model_params:
  model_architecture: "cylinder_asym"

  output_shape:
    - 480
    - 360
    - 32

  fea_dim: 8
  out_fea_dim: 256
  num_class: 3
  num_input_features: 16
  use_norm: True
  init_size: 32


###################
## Dataset options (not used in demo mode, but required by schema)
dataset_params:
  dataset_type: "cylinder_dataset"
  pc_dataset_type: "SemKITTI_sk"
  ignore_label: 0
  return_test: False
  fixed_volume_space: True
  label_mapping: "config/label_mapping/semantic-kitti.yaml"
  max_volume_space:
    - 50
    - 3.1415926
    - 2
  min_volume_space:
    - 0
    - -3.1415926
    - -4


###################
## Data_loader options
train_data_loader:
  data_path: "demo"
  imageset: "train"
  return_ref: True
  batch_size: 2
  shuffle: True
  num_workers: 0

val_data_loader:
  data_path: "demo"
  imageset: "val"
  return_ref: True
  batch_size: 2
  shuffle: False
  num_workers: 0


###################
## Train params
train_params:
  model_load_path: "none"
  model_save_path: "checkpoints/demo_best.pt"
  checkpoint_every_n_steps: 100
  max_num_epochs: 2
  eval_every_n_steps: 100
  learning_rate: 0.0001
